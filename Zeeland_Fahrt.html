<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Fahrt nach Zeeland 🌊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
}
canvas {
  display: block;
  touch-action: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Constants & Configuration ───────────────────────────────────────────────
const ZONES = [
  { dist: 0,     name: 'Köln',    skyTop: '#1a1a2e', skyBot: '#c0392b', emoji: '⛪', subtitle: 'Kölner Dom · Rheinbrücke · Abfahrt!', grassA: '#2d5a1b', grassB: '#3a7a24' },
  { dist: 7000,  name: 'Aachen',  skyTop: '#0f3460', skyBot: '#533483', emoji: '🏛️', subtitle: 'Aachener Dom · Grenzstadt', grassA: '#2d5a1b', grassB: '#3a7a24' },
  { dist: 13000, name: 'Belgien', skyTop: '#0f3460', skyBot: '#e74c3c', emoji: '🇧🇪', subtitle: 'Grenzübergang · Bienvenue en Belgique!', grassA: '#2d5a1b', grassB: '#3a7a24' },
  { dist: 19000, name: 'Brüssel', skyTop: '#1a1a2e', skyBot: '#0d47a1', emoji: '⚛️', subtitle: 'Atomium · Grand Place · Manneken Pis', grassA: '#2d5a1b', grassB: '#3a7a24' },
  { dist: 25000, name: 'Gent',    skyTop: '#0d3b00', skyBot: '#1b6ca8', emoji: '🏰', subtitle: 'Gravensteen · Belfort · Graslei', grassA: '#2d5a1b', grassB: '#3a7a24' },
  { dist: 31000, name: 'Brügge',  skyTop: '#003d00', skyBot: '#0077be', emoji: '🔔', subtitle: 'Belfort · Grachten · Windmühlen', grassA: '#2d5a1b', grassB: '#3a7a24' },
  { dist: 37000, name: 'Zeeland', skyTop: '#0077be', skyBot: '#00b4d8', emoji: '🌊', subtitle: '🎉 Dormio Strand Resort · Ihr habt es geschafft!', grassA: '#e8d5a3', grassB: '#d4c48f' },
];

const OBS_TYPES = [
  { emoji: '🚗', damage: true,  score: 0,   width: 0.28, speed: 0.0 },
  { emoji: '🚕', damage: true,  score: 0,   width: 0.28, speed: 0.0 },
  { emoji: '🚛', damage: true,  score: 0,   width: 0.45, speed: 0.0 },
  { emoji: '♻️', damage: false, score: 50,  width: 0.22, speed: 0.0 },
  { emoji: '🗑️', damage: true,  score: 0,   width: 0.22, speed: 0.0 },
  { emoji: '⭐', damage: false, score: 100, width: 0.20, speed: 0.0 },
  { emoji: '🦆', damage: false, score: 10,  width: 0.20, speed: 0.0 },
];

const ZONE_LANDMARKS = [
  [{ emoji: '⛪', name: 'Kölner Dom', side: 1 }, { emoji: '🌉', name: 'Rheinbrücke', side: -1 }],
  [{ emoji: '🏛️', name: 'Aachener Dom', side: -1 }, { emoji: '🏺', name: 'Rathaus', side: 1 }],
  [{ emoji: '🇧🇪', name: 'Belgien!', side: 1 }],
  [{ emoji: '⚛️', name: 'Atomium', side: -1 }, { emoji: '🏛️', name: 'Grand Place', side: 1 }],
  [{ emoji: '🏰', name: 'Gravensteen', side: 1 }, { emoji: '🔔', name: 'Belfort Gent', side: -1 }],
  [{ emoji: '🔔', name: 'Belfort Brügge', side: -1 }, { emoji: '🌬️', name: 'Windmühle', side: 1 }],
  [{ emoji: '🌊', name: 'Nordsee!', side: -1 }, { emoji: '🏖️', name: 'Dormio Resort', side: 1 }],
];

const LANES = [-0.55, 0, 0.55];

// ─── Architecture: Classes & Object Pooling ────────────────────────────────
class Pool {
  constructor(size, factory) {
    this.items = Array.from({ length: size }, factory);
    this.index = 0;
  }
  spawn() {
    for (let i = 0; i < this.items.length; i++) {
      let item = this.items[(this.index + i) % this.items.length];
      if (!item.alive) {
        this.index = (this.index + i + 1) % this.items.length;
        item.alive = true;
        return item;
      }
    }
    return null;
  }
  forEach(callback) {
    for (let i = 0; i < this.items.length; i++) {
      if (this.items[i].alive) callback(this.items[i]);
    }
  }
  reset() {
    this.items.forEach(item => item.alive = false);
  }
}

class InputManager {
  constructor(canvas) {
    this.keys = {};
    this.touchLeft = false;
    this.touchRight = false;
    this.gyroValue = 0;
    this.gyroAvailable = false;

    document.addEventListener('keydown', e => this.keys[e.code] = true);
    document.addEventListener('keyup', e => this.keys[e.code] = false);

    this.handleTouches = (touches) => {
      this.touchLeft = false; this.touchRight = false;
      const rect = canvas.getBoundingClientRect();
      for (let t of touches) {
        const x = t.clientX - rect.left;
        if (x < canvas.width / 2) this.touchLeft = true;
        else this.touchRight = true;
      }
    };
  }

  getSteer() {
    let steer = 0;
    if (this.keys['ArrowLeft'] || this.keys['KeyA']) steer -= 1;
    if (this.keys['ArrowRight'] || this.keys['KeyD']) steer += 1;
    if (this.touchLeft) steer -= 1;
    if (this.touchRight) steer += 1;

    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (let pad of pads) {
      if (pad && pad.axes && pad.axes.length > 0) {
        const v = pad.axes[0];
        if (Math.abs(v) > 0.1) steer += v;
      }
    }
    if (this.gyroAvailable && Math.abs(this.gyroValue) > 0.05) steer += this.gyroValue;
    return Math.max(-1, Math.min(1, steer));
  }

  setupGyro() {
    window.addEventListener('deviceorientation', e => {
      if (e.gamma !== null) {
        this.gyroAvailable = true;
        this.gyroValue = Math.max(-1, Math.min(1, e.gamma / 30));
      }
    });
  }
}

// ─── Main Game Engine ────────────────────────────────────────────────────────
class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.input = new InputManager(canvas);

    this.obstacles = new Pool(60, () => ({ alive: false, z: 0, laneX: 0, type: null }));
    this.landmarks = new Pool(100, () => ({ alive: false, z: 0, side: 0, emoji: '', name: '', kind: '' }));
    this.particles = new Pool(150, () => ({ alive: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1, color: '', r: 0 }));
    this.clouds = new Pool(20, () => ({ alive: false, x: 0, y: 0, w: 0, h: 0, speed: 0 }));
    this.comets = new Pool(15, () => ({ alive: false, x: 0, y: 0, vx: 0, vy: 0, tailLen: 0, life: 0, size: 0 }));

    this.state = 'menu';
    this.highscore = 0;
    this.lastTime = performance.now();
    this.cometTimer = 0;

    this.player = { pos: 0, x: 0, speed: 3, lives: 3, score: 0, invincible: 0 };
    this.gameLogic = { currentZone: 0, zoneAnnounce: null, nextWaveZ: 0, curveStrength: 0, pitch: 0, drawDistance: 4000 };

    this.resize = () => {
      const isMobile = window.innerWidth <= 520 || window.innerHeight > window.innerWidth;
      if (isMobile) {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      } else {
        this.canvas.height = window.innerHeight;
        this.canvas.width = Math.min(480, window.innerWidth);
      }
    };
    window.addEventListener('resize', this.resize);
    this.resize();

    this.canvas.addEventListener('click', e => this.handleClick(e));
    this.canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (this.state !== 'game') this.startGame();
      this.input.handleTouches(e.touches);
    }, { passive: false });
    this.canvas.addEventListener('touchmove', e => { e.preventDefault(); this.input.handleTouches(e.touches); }, { passive: false });
    this.canvas.addEventListener('touchend', e => {
      e.preventDefault();
      this.input.touchLeft = false; this.input.touchRight = false;
      this.input.handleTouches(e.touches);
    }, { passive: false });

    this.loop = this.loop.bind(this);
    requestAnimationFrame(this.loop);
  }

  handleClick(e) {
    const rect = this.canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const W = this.canvas.width, H = this.canvas.height;
    if (this.state === 'menu' && y > H * 0.52 && y < H * 0.65 && x > W * 0.2 && x < W * 0.8) this.startGame();
    else if ((this.state === 'over' || this.state === 'win') && y > H * 0.65 && y < H * 0.80 && x > W * 0.2 && x < W * 0.8) this.startGame();
  }

  startGame() {
    this.obstacles.reset(); this.landmarks.reset(); this.particles.reset();
    this.clouds.reset(); this.comets.reset();

    this.player = { pos: 0, x: 0, speed: 3, lives: 3, score: 0, invincible: 0 };
    this.gameLogic.currentZone = 0;
    this.gameLogic.zoneAnnounce = null;
    this.gameLogic.nextWaveZ = 4500;
    this.state = 'game';

    for (let i = 0; i < 6; i++) this.spawnCloud();
    for (let i = 0; i < 24; i++) {
      let lm = this.landmarks.spawn();
      if (lm) {
        lm.z = 500 + i * 400 + Math.random() * 200;
        lm.side = i % 2 === 0 ? -1 : 1;
        lm.emoji = ['🌳','🌲','🌳'][Math.floor(Math.random()*3)];
        lm.kind = 'tree';
      }
    }
    this.announceZone(0);
    for (let i = 0; i < 3; i++) this.spawnObstacle(3500 + i * 1200);

    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(p => { if (p === 'granted') this.input.setupGyro(); }).catch(() => {});
    } else this.input.setupGyro();
  }

  spawnComet() {
    let c = this.comets.spawn();
    if (!c) return;
    const fromLeft = Math.random() > 0.5;
    c.x = fromLeft ? -0.05 : 1.05;
    c.y = 0.04 + Math.random() * 0.38;
    c.vx = (fromLeft ? 1 : -1) * (0.18 + Math.random() * 0.22);
    c.vy = 0.04 + Math.random() * 0.08;
    c.tailLen = 0.12 + Math.random() * 0.12;
    c.life = 1.0;
    c.size = 1.5 + Math.random() * 2;
  }

  spawnCloud() {
    let c = this.clouds.spawn();
    if (!c) return;
    c.x = Math.random(); c.y = 0.05 + Math.random() * 0.35;
    c.w = 0.15 + Math.random() * 0.20; c.h = 0.04 + Math.random() * 0.06;
    c.speed = 0.00003 + Math.random() * 0.00004;
  }

  spawnObstacle(zOverride) {
    let obs = this.obstacles.spawn();
    if (!obs) return;
    obs.type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
    obs.laneX = LANES[Math.floor(Math.random() * LANES.length)];
    obs.z = zOverride !== undefined ? this.player.pos + zOverride : this.player.pos + 5500 + Math.random() * 800;
  }

  spawnWave() {
    // Best Practice: max 2 von 3 Spuren, immer 1 frei
    const fillCount = Math.random() < 0.6 ? 1 : 2;
    const indices = [0, 1, 2].sort(() => Math.random() - 0.5).slice(0, fillCount);
    // Staffelung: Hindernisse innerhalb einer Welle um min. 1400 Einheiten versetzt
    // → nie zwei Autos auf gleicher Höhe → immer dodgable
    indices.forEach((idx, waveIdx) => {
      let obs = this.obstacles.spawn();
      if (!obs) return;
      const pool = Math.random() < 0.35 ? OBS_TYPES.filter(t => !t.damage) : OBS_TYPES.filter(t => t.damage);
      obs.type = pool[Math.floor(Math.random() * pool.length)];
      obs.laneX = LANES[idx];
      obs.z = this.player.pos + 5500 + waveIdx * 1400 + Math.random() * 300;
    });
    // Nächste Welle erst nach letztem Hindernis + Reaktionszeit
    this.gameLogic.nextWaveZ = this.player.pos + 5500 + (indices.length - 1) * 1400 + 1100 + Math.random() * 600;
  }

  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      let p = this.particles.spawn();
      if (!p) continue;
      const angle = Math.random() * Math.PI * 2;
      const spd = 80 + Math.random() * 120;
      p.x = x; p.y = y;
      p.vx = Math.cos(angle) * spd; p.vy = Math.sin(angle) * spd;
      p.life = 0.5 + Math.random() * 0.4; p.maxLife = 0.9;
      p.color = color; p.r = 3 + Math.random() * 4;
    }
  }

  announceZone(idx) {
    this.gameLogic.zoneAnnounce = { idx, timer: 2.5, alpha: 0 };
    this.player.score += 200;
    const lms = ZONE_LANDMARKS[idx] || [];
    lms.forEach((lmData, i) => {
      let lm = this.landmarks.spawn();
      if (lm) {
        lm.z = this.player.pos + 1500 + i * 1800; lm.side = lmData.side;
        lm.emoji = lmData.emoji; lm.name = lmData.name; lm.kind = 'sign';
      }
    });
    for (let i = 0; i < 14; i++) {
      let lm = this.landmarks.spawn();
      if (lm) {
        lm.z = this.player.pos + 800 + i * 480 + Math.random() * 200;
        lm.side = i % 2 === 0 ? -1 : 1; lm.emoji = ['🌳','🌲','🌴','🌳','🌲'][Math.floor(Math.random()*5)];
        lm.kind = 'tree';
      }
    }
  }

  update(dt) {
    if (this.state !== 'game') return;
    dt = Math.min(dt, 0.05);

    this.player.speed = Math.min(9, 2.5 + this.player.pos / 6500);

    // Pseudo-3D Kurven & Hügel (Pitch)
    this.gameLogic.curveStrength = Math.sin(this.player.pos / 3000) * 1.5 + Math.sin(this.player.pos / 5000) * 1.0;
    this.gameLogic.pitch = Math.cos(this.player.pos / 2500) * 50;

    // Fliehkraft (Centrifugal Force): Drückt das Auto in der Kurve nach außen
    let centrifugalForce = this.gameLogic.curveStrength * (this.player.speed / 9) * 2.2 * dt;

    let steer = this.input.getSteer();
    this.player.x += steer * 3.6 * dt;
    this.player.x -= centrifugalForce;

    if (Math.abs(steer) < 0.05) this.player.x *= Math.pow(0.85, dt * 60);
    this.player.x = Math.max(-0.75, Math.min(0.75, this.player.x));

    this.player.pos += this.player.speed * 60 * dt;
    this.player.score += this.player.speed * dt * 10;

    for (let i = ZONES.length - 1; i >= 0; i--) {
      if (this.player.pos >= ZONES[i].dist && this.gameLogic.currentZone < i) {
        this.gameLogic.currentZone = i;
        this.announceZone(i);
        break;
      }
    }

    if (this.player.invincible > 0) this.player.invincible -= dt * 60;

    if (this.gameLogic.zoneAnnounce) {
      let za = this.gameLogic.zoneAnnounce;
      za.timer -= dt;
      if (za.timer > 2.0) za.alpha = Math.min(1, (2.5 - za.timer) * 4);
      else if (za.timer < 0.5) za.alpha = Math.max(0, za.timer * 2);
      else za.alpha = 1;
      if (za.timer <= 0) this.gameLogic.zoneAnnounce = null;
    }

    this.obstacles.forEach(obs => {
      obs.z -= obs.type.speed * this.player.speed * 60 * dt;
      if (obs.z < this.player.pos - 200) obs.alive = false;
    });

    if (this.player.pos + 5500 >= this.gameLogic.nextWaveZ) this.spawnWave();

    if (this.player.invincible <= 0) {
      this.obstacles.forEach(obs => {
        const dz = obs.z - this.player.pos;
        if (dz > -150 && dz < 400) {
          const dx = Math.abs(this.player.x - obs.laneX);
          const hitRadius = obs.type.width * 0.6;
          if (dx < hitRadius) {
            obs.alive = false;
            const carY = this.canvas.height * 0.78;
            if (obs.type.damage) {
              this.player.lives--;
              this.player.invincible = 120;
              this.spawnParticles(this.canvas.width / 2, carY, '#ff4444', 18);
              if (this.player.lives <= 0) {
                if (this.player.score > this.highscore) this.highscore = Math.floor(this.player.score);
                this.state = 'over';
              }
            } else {
              this.player.score += obs.type.score;
              this.spawnParticles(this.canvas.width / 2, carY, '#ffd700', 12);
            }
          }
        }
      });
    }

    this.landmarks.forEach(lm => { if (lm.z < this.player.pos - 800) lm.alive = false; });
    let treesAhead = 0, lastZ = this.player.pos + 2000;
    this.landmarks.forEach(lm => {
      if (lm.kind === 'tree' && lm.z > this.player.pos + 2000) {
        treesAhead++;
        if (lm.z > lastZ) lastZ = lm.z;
      }
    });
    if (treesAhead < 8) {
      for (let i = 0; i < 6; i++) {
        let lm = this.landmarks.spawn();
        if (lm) {
          lm.z = lastZ + 400 + i * 400 + Math.random() * 200;
          lm.side = Math.random() > 0.5 ? -1 : 1;
          lm.emoji = ['🌳','🌲','🌳','🌲'][Math.floor(Math.random()*4)];
          lm.kind = 'tree';
        }
      }
    }

    this.particles.forEach(p => {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 150 * dt; p.life -= dt;
      if (p.life <= 0) p.alive = false;
    });
    this.clouds.forEach(c => {
      c.x += c.speed * this.player.speed * 60 * dt;
      if (c.x > 1.3) c.x = -0.3;
    });
    this.cometTimer -= dt;
    if (this.cometTimer <= 0) {
      this.spawnComet();
      this.cometTimer = 3 + Math.random() * 6;
    }
    this.comets.forEach(c => {
      c.x += c.vx * dt; c.y += c.vy * dt;
      if (c.x < -0.2 || c.x > 1.2 || c.y > 0.5) c.alive = false;
      else c.life -= dt * 0.4;
      if (c.life <= 0) c.alive = false;
    });

    if (this.player.pos >= 38000) {
      this.player.score += 1000;
      if (this.player.score > this.highscore) this.highscore = Math.floor(this.player.score);
      this.state = 'win';
    }
  }

  getProjection(dz, playerX, curveStrength, W, horizonY, roadBottom) {
    const z = dz / 1000 + 0.5;
    const scale = 1 / z;
    const dx = curveStrength * (dz * dz) * 0.00015;
    const perspectiveX = (dx - playerX * 400) * scale;
    const camHeight = (roadBottom - horizonY) * 0.5;
    const y = horizonY + camHeight * scale;
    const roadW = W * 0.8 * scale;

    return {
      x: W/2 + perspectiveX * (W/1000),
      y: y,
      w: roadW,
      scale: scale
    };
  }

  draw() {
    const W = this.canvas.width, H = this.canvas.height;
    if (this.state === 'menu') {
      this.drawMenu(W, H);
    } else {
      this.drawGameScene(W, H);
      if (this.state === 'over') this.drawGameOver(W, H);
      else if (this.state === 'win') this.drawWin(W, H);
    }
  }

  drawGameScene(W, H) {
    const zone = ZONES[this.gameLogic.currentZone];

    const baseHorizonY = H * 0.45;
    const horizonY = baseHorizonY - this.gameLogic.pitch * (H / 800);
    const roadBottom = H;

    // 1. Sky & Background
    const sky = this.ctx.createLinearGradient(0, 0, 0, Math.max(0, horizonY));
    sky.addColorStop(0, zone.skyTop); sky.addColorStop(1, zone.skyBot);
    this.ctx.fillStyle = sky;
    this.ctx.fillRect(0, 0, W, horizonY);

    this.ctx.fillStyle = '#fff';
    this.clouds.forEach(c => {
      this.ctx.globalAlpha = 0.6;
      const cx = c.x * W, cy = c.y * baseHorizonY, cw = c.w * W, ch = c.h * baseHorizonY;
      this.ctx.beginPath(); this.ctx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2); this.ctx.fill();
      this.ctx.beginPath(); this.ctx.ellipse(cx - cw*0.3, cy + ch*0.1, cw*0.6, ch*0.8, 0, 0, Math.PI * 2); this.ctx.fill();
      this.ctx.beginPath(); this.ctx.ellipse(cx + cw*0.3, cy + ch*0.15, cw*0.5, ch*0.75, 0, 0, Math.PI * 2); this.ctx.fill();
      this.ctx.globalAlpha = 1;
    });

    this.ctx.font = `${Math.floor(H * 0.08)}px serif`;
    this.ctx.textAlign = 'center';
    this.ctx.globalAlpha = 0.5;
    this.ctx.fillText(zone.emoji, W * 0.15, horizonY * 0.55);
    this.ctx.globalAlpha = 1;

    const horizonShift = this.gameLogic.curveStrength * W * 0.1;
    this.ctx.fillStyle = 'rgba(0,0,0,0.30)';
    const silOffset = (-this.player.pos * 0.05 - horizonShift) % W;
    this.ctx.save();
    this.ctx.translate(silOffset, 0);
    for(let i=0; i<2; i++) {
      this.ctx.beginPath();
      this.ctx.moveTo(i*W, horizonY);
      this.ctx.lineTo(i*W + W*0.1, horizonY - H*0.08);
      this.ctx.lineTo(i*W + W*0.3, horizonY - H*0.03);
      this.ctx.lineTo(i*W + W*0.5, horizonY - H*0.1);
      this.ctx.lineTo(i*W + W*0.8, horizonY - H*0.04);
      this.ctx.lineTo(i*W + W, horizonY);
      this.ctx.fill();
    }
    this.ctx.restore();

    // 2. 3D Curved Road
    const segmentsToDraw = 45;
    const zMax = this.gameLogic.drawDistance;

    for (let i = segmentsToDraw - 1; i >= 0; i--) {
      let dz2 = ((i + 1) / segmentsToDraw) * zMax;
      let dz1 = (i / segmentsToDraw) * zMax;

      let p2 = this.getProjection(dz2, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);
      let p1 = this.getProjection(dz1, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);

      let globalZ = this.player.pos + dz1;
      let isDark = Math.floor(globalZ / 200) % 2 === 0;

      this.ctx.fillStyle = isDark ? zone.grassA : zone.grassB;
      this.ctx.fillRect(0, p2.y - 1, W, p1.y - p2.y + 2);

      this.ctx.fillStyle = isDark ? '#555' : '#4a4a4a';
      this.ctx.beginPath();
      this.ctx.moveTo(p1.x - p1.w/2, p1.y); this.ctx.lineTo(p1.x + p1.w/2, p1.y);
      this.ctx.lineTo(p2.x + p2.w/2, p2.y); this.ctx.lineTo(p2.x - p2.w/2, p2.y);
      this.ctx.fill();

      let rW1 = p1.w * 0.08, rW2 = p2.w * 0.08;
      this.ctx.fillStyle = isDark ? '#cc0000' : '#ffffff';
      this.ctx.beginPath();
      this.ctx.moveTo(p1.x - p1.w/2, p1.y); this.ctx.lineTo(p1.x - p1.w/2 + rW1, p1.y);
      this.ctx.lineTo(p2.x - p2.w/2 + rW2, p2.y); this.ctx.lineTo(p2.x - p2.w/2, p2.y);
      this.ctx.fill();
      this.ctx.beginPath();
      this.ctx.moveTo(p1.x + p1.w/2 - rW1, p1.y); this.ctx.lineTo(p1.x + p1.w/2, p1.y);
      this.ctx.lineTo(p2.x + p2.w/2, p2.y); this.ctx.lineTo(p2.x + p2.w/2 - rW2, p2.y);
      this.ctx.fill();

      if (!isDark) {
        this.ctx.fillStyle = '#fff';
        let laneW1 = p1.w * 0.02, laneW2 = p2.w * 0.02;
        let lx1 = p1.x - p1.w/6, lx2 = p2.x - p2.w/6;
        this.ctx.beginPath();
        this.ctx.moveTo(lx1 - laneW1/2, p1.y); this.ctx.lineTo(lx1 + laneW1/2, p1.y);
        this.ctx.lineTo(lx2 + laneW2/2, p2.y); this.ctx.lineTo(lx2 - laneW2/2, p2.y);
        this.ctx.fill();
        let rx1 = p1.x + p1.w/6, rx2 = p2.x + p2.w/6;
        this.ctx.beginPath();
        this.ctx.moveTo(rx1 - laneW1/2, p1.y); this.ctx.lineTo(rx1 + laneW1/2, p1.y);
        this.ctx.lineTo(rx2 + laneW2/2, p2.y); this.ctx.lineTo(rx2 - laneW2/2, p2.y);
        this.ctx.fill();
      }
    }

    // 3. Draw Objects (sortiert nach Tiefe)
    let drawList = [];
    this.obstacles.forEach(obs => {
      let dz = obs.z - this.player.pos;
      if (dz > 0 && dz < zMax) drawList.push({ type: 'obs', item: obs, dz: dz });
    });
    this.landmarks.forEach(lm => {
      let dz = lm.z - this.player.pos;
      if (dz > 0 && dz < zMax) drawList.push({ type: 'lm', item: lm, dz: dz });
    });

    drawList.sort((a, b) => b.dz - a.dz);

    drawList.forEach(obj => {
      let p = this.getProjection(obj.dz, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);
      if (obj.type === 'obs') {
        let o = obj.item;
        let screenX = p.x + o.laneX * (p.w / 2);
        let baseSize = Math.max(12, 120 * (p.scale / 2) * (H/600));

        // ── Farbige Hintergrund-Pille für klare Sichtbarkeit ────────────
        // Rot = Schaden, Gold = Stern, Grün = Sammelobjekt
        const bgAlpha = Math.min(0.78, p.scale * 1.4);
        const pad = baseSize * 0.16;
        const boxW = baseSize * 1.12 + pad * 2;
        const boxH = baseSize + pad * 1.7;
        if (o.type.damage) {
          this.ctx.fillStyle = `rgba(180,40,0,${bgAlpha * 0.72})`;
          this.ctx.strokeStyle = `rgba(255,110,20,${bgAlpha})`;
        } else if (o.type.score >= 100) {
          this.ctx.fillStyle = `rgba(180,140,0,${bgAlpha * 0.72})`;
          this.ctx.strokeStyle = `rgba(255,220,0,${bgAlpha})`;
        } else {
          this.ctx.fillStyle = `rgba(0,140,80,${bgAlpha * 0.65})`;
          this.ctx.strokeStyle = `rgba(0,220,120,${bgAlpha})`;
        }
        this.ctx.beginPath();
        this.ctx.roundRect(screenX - boxW/2, p.y - baseSize - pad, boxW, boxH, boxH * 0.26);
        this.ctx.fill();
        this.ctx.lineWidth = Math.max(1.2, baseSize * 0.05);
        this.ctx.stroke();

        // Schatten + Emoji
        this.ctx.font = `${baseSize}px serif`;
        this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'bottom';
        this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
        this.ctx.beginPath(); this.ctx.ellipse(screenX, p.y + 2, baseSize * 0.38, baseSize * 0.09, 0, 0, Math.PI*2); this.ctx.fill();
        this.ctx.fillStyle = '#000';
        this.ctx.fillText(o.type.emoji, screenX, p.y);
      } else {
        let lm = obj.item;
        let sideOffset = lm.kind === 'tree' ? 0.75 : 0.85;
        let screenX = p.x + lm.side * (p.w * sideOffset);
        this.ctx.globalAlpha = obj.dz > zMax - 500 ? (zMax - obj.dz)/500 : 1;

        if (lm.kind === 'tree') {
          let treeSize = Math.max(16, 280 * p.scale * (H/800));
          this.ctx.font = `${treeSize}px serif`;
          this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'bottom';
          this.ctx.fillText(lm.emoji, screenX, p.y + treeSize * 0.05);
        } else {
          let signH = Math.max(15, 180 * p.scale * (H/800));
          let signW = signH * 2.4;
          let signColor = lm.side > 0 ? '#1565c0' : '#2e7d32';
          this.ctx.fillStyle = '#666';
          let postW = Math.max(2, p.scale * 6);
          this.ctx.fillRect(screenX - signW*0.28, p.y - signH*1.4, postW, signH*1.4);
          this.ctx.fillRect(screenX + signW*0.28, p.y - signH*1.4, postW, signH*1.4);
          this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
          this.ctx.beginPath(); this.ctx.roundRect(screenX - signW/2 + 2, p.y - signH*2.5 + 2, signW, signH, 4); this.ctx.fill();
          this.ctx.fillStyle = signColor;
          this.ctx.beginPath(); this.ctx.roundRect(screenX - signW/2, p.y - signH*2.5, signW, signH, 4); this.ctx.fill();
          this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = Math.max(1, p.scale * 3); this.ctx.stroke();

          let fSize = signH * 0.4;
          if (fSize > 4) {
            this.ctx.fillStyle = '#fff';
            this.ctx.font = `bold ${fSize}px Segoe UI`;
            this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'middle';
            this.ctx.fillText(lm.name, screenX, p.y - signH * 2.0);
          }
        }
        this.ctx.globalAlpha = 1;
      }
    });
    this.ctx.textBaseline = 'alphabetic';

    // ── Spielerposition-Pfeil auf der Straße ────────────────────────────────
    // Bewegt sich mit playerX. Zeigt dir GENAU, wo dein Auto auf der Straße ist.
    {
      // Projiziere die Position direkt vor dem Auto (dz=200)
      const arP = this.getProjection(200, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);
      const arScreenX = arP.x + this.player.x * (arP.w / 2);
      const arH = arP.w * 0.10;
      const arW = arH * 0.75;
      const flash = this.player.invincible > 0 ? (Math.floor(this.player.invincible / 6) % 2 === 0) : false;
      this.ctx.save();
      this.ctx.globalAlpha = flash ? 0.25 : 0.85;
      this.ctx.fillStyle = this.player.invincible > 0 ? '#ff4444' : '#44ffaa';
      this.ctx.strokeStyle = '#fff';
      this.ctx.lineWidth = Math.max(1.5, arH * 0.08);
      this.ctx.beginPath();
      this.ctx.moveTo(arScreenX,            arP.y);
      this.ctx.lineTo(arScreenX - arW / 2,  arP.y - arH);
      this.ctx.lineTo(arScreenX - arW*0.15, arP.y - arH * 0.65);
      this.ctx.lineTo(arScreenX - arW*0.15, arP.y - arH * 1.55);
      this.ctx.lineTo(arScreenX + arW*0.15, arP.y - arH * 1.55);
      this.ctx.lineTo(arScreenX + arW*0.15, arP.y - arH * 0.65);
      this.ctx.lineTo(arScreenX + arW / 2,  arP.y - arH);
      this.ctx.closePath();
      this.ctx.fill();
      this.ctx.stroke();
      this.ctx.restore();
    }

    // 4. Player Car HUD / Hood (deine geschwungene Motorhaube)
    const hoodTop = roadBottom - H * 0.005;
    const hoodGrad = this.ctx.createLinearGradient(0, hoodTop, 0, H);
    hoodGrad.addColorStop(0, '#0d0d0d'); hoodGrad.addColorStop(0.5, '#2a2a2a'); hoodGrad.addColorStop(1, '#0a0a0a');
    this.ctx.fillStyle = hoodGrad;
    this.ctx.beginPath(); this.ctx.moveTo(0, H); this.ctx.lineTo(0, hoodTop);
    this.ctx.quadraticCurveTo(W/2, roadBottom - H*0.06, W, hoodTop);
    this.ctx.lineTo(W, H); this.ctx.fill();

    const wheelY = roadBottom - H * 0.02;
    const wheelR = W * 0.18;
    this.ctx.fillStyle = '#111';
    this.ctx.beginPath(); this.ctx.arc(W/2, wheelY, wheelR, Math.PI, 0); this.ctx.fill();
    this.ctx.strokeStyle = '#333'; this.ctx.lineWidth = W * 0.04; this.ctx.stroke();
    let steer = this.input.getSteer();
    const wheelAng = -Math.PI/2 + steer * 1.5;
    const dotX = W/2 + Math.cos(wheelAng)*wheelR, dotY = wheelY + Math.sin(wheelAng)*wheelR;
    this.ctx.fillStyle = '#ff4444';
    this.ctx.beginPath(); this.ctx.arc(dotX, dotY, W * 0.012, 0, Math.PI*2); this.ctx.fill();

    // ── Dashboard-Overlay auf der Motorhaube ─────────────────────────────────
    // Spuranzeige (3 Punkte) + Mini-Tacho — eingelegt in die Motorhaube
    {
      // Aktuelle Spur ermitteln
      const nearestLane = LANES.reduce((best, lx, i) =>
        Math.abs(this.player.x - lx) < Math.abs(this.player.x - LANES[best]) ? i : best, 0);

      // Spuranzeige links auf der Motorhaube
      const liY = H - H * 0.085;
      const liCX = W * 0.18;
      this.ctx.fillStyle = 'rgba(255,255,255,0.55)';
      this.ctx.font = `bold ${Math.floor(W * 0.022)}px Segoe UI`;
      this.ctx.textAlign = 'center';
      this.ctx.fillText('SPUR', liCX, liY - W * 0.028);
      [-1, 0, 1].forEach((off, i) => {
        const dx = liCX + off * W * 0.045;
        const active = (i === nearestLane);
        const dotR = W * 0.015;
        if (active) {
          this.ctx.save();
          this.ctx.globalAlpha = 0.35;
          this.ctx.fillStyle = this.player.invincible > 0 ? '#ff4444' : '#00ff99';
          this.ctx.beginPath();
          this.ctx.arc(dx, liY, dotR * 2.0, 0, Math.PI * 2);
          this.ctx.fill();
          this.ctx.restore();
        }
        this.ctx.fillStyle = active
          ? (this.player.invincible > 0 ? '#ff5555' : '#00ff99')
          : 'rgba(255,255,255,0.18)';
        this.ctx.beginPath();
        this.ctx.arc(dx, liY, dotR, 0, Math.PI * 2);
        this.ctx.fill();
      });

      // Mini-Tacho rechts auf der Motorhaube
      const sx = W * 0.82, sy = H - H * 0.07, sr = W * 0.06;
      this.ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      this.ctx.lineWidth = sr * 0.30;
      this.ctx.lineCap = 'round';
      this.ctx.beginPath();
      this.ctx.arc(sx, sy, sr, Math.PI * 0.75, Math.PI * 2.25);
      this.ctx.stroke();
      const frac = this.player.speed / 9;
      this.ctx.strokeStyle = frac > 0.8 ? '#ff3333' : frac > 0.55 ? '#ffaa00' : '#00dd88';
      this.ctx.beginPath();
      this.ctx.arc(sx, sy, sr, Math.PI * 0.75, Math.PI * 0.75 + frac * Math.PI * 1.5);
      this.ctx.stroke();
      this.ctx.lineCap = 'butt';
      this.ctx.fillStyle = '#fff';
      this.ctx.font = `bold ${Math.floor(W * 0.028)}px Segoe UI`;
      this.ctx.textAlign = 'center';
      this.ctx.fillText(`${Math.floor(this.player.speed * 20)}`, sx, sy + W * 0.010);
      this.ctx.fillStyle = 'rgba(255,255,255,0.55)';
      this.ctx.font = `${Math.floor(W * 0.016)}px Segoe UI`;
      this.ctx.fillText('km/h', sx, sy + W * 0.030);
    }

    if (this.player.invincible > 0 && Math.floor(this.player.invincible / 6) % 2 === 0) {
      this.ctx.fillStyle = 'rgba(255,0,0,0.18)'; this.ctx.fillRect(0, 0, W, H);
    }

    // 5. Particles
    this.particles.forEach(p => {
      this.ctx.globalAlpha = p.life / p.maxLife;
      this.ctx.fillStyle = p.color;
      this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); this.ctx.fill();
    });
    this.ctx.globalAlpha = 1;

    // 6. UI overlays
    this.ctx.fillStyle = 'rgba(0,0,0,0.5)'; this.ctx.fillRect(0, 0, W, H * 0.08);
    this.ctx.font = `${Math.floor(H * 0.045)}px serif`; this.ctx.textAlign = 'left';
    let livesStr = ''; for(let i=0; i<this.player.lives; i++) livesStr += '❤️';
    this.ctx.fillText(livesStr, 8, H * 0.062);
    this.ctx.fillStyle = '#ffd700'; this.ctx.font = `bold ${Math.floor(H * 0.042)}px Segoe UI`; this.ctx.textAlign = 'center';
    this.ctx.fillText(Math.floor(this.player.score).toLocaleString('de-DE'), W/2, H * 0.062);
    this.ctx.font = `${Math.floor(H * 0.038)}px serif`; this.ctx.textAlign = 'right'; this.ctx.fillStyle = '#fff';
    this.ctx.fillText(zone.emoji + ' ' + zone.name, W - 8, H * 0.062);

    const progress = Math.min(1, this.player.pos / 38000);
    this.ctx.fillStyle = 'rgba(255,255,255,0.3)'; this.ctx.fillRect(0, H - 6, W, 6);
    this.ctx.fillStyle = '#27ae60'; this.ctx.fillRect(0, H - 6, W * progress, 6);

    if (this.gameLogic.zoneAnnounce) {
      let za = this.gameLogic.zoneAnnounce;
      this.ctx.globalAlpha = za.alpha;
      this.ctx.fillStyle = 'rgba(0,0,0,0.6)';
      this.ctx.fillRect(0, H*0.35, W, H*0.25);
      this.ctx.textAlign = 'center';
      this.ctx.font = `${Math.floor(H * 0.08)}px serif`; this.ctx.fillText(zone.emoji, W/2, H*0.44);
      this.ctx.font = `bold ${Math.floor(H * 0.055)}px Segoe UI`; this.ctx.fillStyle = '#fff'; this.ctx.fillText(zone.name, W/2, H*0.52);
      this.ctx.font = `${Math.floor(H * 0.030)}px Segoe UI`; this.ctx.fillStyle = '#ddd';
      this.ctx.fillText(zone.subtitle, W/2, H*0.57);
      this.ctx.globalAlpha = 1;
    }
  }

  drawMenu(W, H) {
    const sky = this.ctx.createLinearGradient(0, 0, 0, H * 0.7);
    sky.addColorStop(0, '#001a40'); sky.addColorStop(1, '#0077be');
    this.ctx.fillStyle = sky; this.ctx.fillRect(0, 0, W, H);

    const ocean = this.ctx.createLinearGradient(0, H * 0.65, 0, H);
    ocean.addColorStop(0, '#0077be'); ocean.addColorStop(1, '#003d6e');
    this.ctx.fillStyle = ocean; this.ctx.fillRect(0, H * 0.65, W, H * 0.35);

    this.ctx.strokeStyle = 'rgba(255,255,255,0.3)'; this.ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      const wy = H * (0.68 + i * 0.06);
      this.ctx.beginPath();
      for (let x = 0; x < W; x += 4) {
        const y = wy + Math.sin(x * 0.04 + i) * 4;
        if (x === 0) this.ctx.moveTo(x, y); else this.ctx.lineTo(x, y);
      }
      this.ctx.stroke();
    }

    this.ctx.textAlign = 'center'; this.ctx.fillStyle = '#fff';
    this.ctx.font = `bold ${Math.floor(W * 0.1)}px Segoe UI`;
    this.ctx.shadowColor = '#000'; this.ctx.shadowBlur = 8;
    this.ctx.fillText('🌊 Fahrt nach', W / 2, H * 0.22);
    this.ctx.font = `bold ${Math.floor(W * 0.14)}px Segoe UI`; this.ctx.fillStyle = '#ffd700';
    this.ctx.fillText('Zeeland!', W / 2, H * 0.34);
    this.ctx.shadowBlur = 0;

    this.ctx.fillStyle = 'rgba(255,255,255,0.85)'; this.ctx.font = `${Math.floor(W * 0.045)}px Segoe UI`;
    this.ctx.fillText('Köln → Aachen → Belgien → Brüssel', W / 2, H * 0.41);
    this.ctx.fillText('→ Gent → Brügge → Zeeland 🏖️', W / 2, H * 0.46);

    const bw = W*0.55, bh = H*0.09, bx = W/2 - bw/2, by = H*0.575 - bh/2;
    const grad = this.ctx.createLinearGradient(bx, by, bx, by + bh);
    grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
    this.ctx.fillStyle = grad; this.ctx.beginPath(); this.ctx.roundRect(bx, by, bw, bh, bh*0.3); this.ctx.fill();
    this.ctx.strokeStyle = 'rgba(255,255,255,0.4)'; this.ctx.lineWidth = 2; this.ctx.stroke();
    this.ctx.fillStyle = '#fff'; this.ctx.font = `bold ${Math.floor(bh * 0.45)}px Segoe UI`;
    this.ctx.fillText('🚙 Losfahren!', W/2, H*0.575 + bh*0.15);

    this.ctx.fillStyle = 'rgba(255,255,255,0.7)'; this.ctx.font = `${Math.floor(W * 0.036)}px Segoe UI`;
    this.ctx.fillText('← → Tasten  |  Touch  |  Gamepad  |  Gyroskop', W / 2, H * 0.70);
    if (this.highscore > 0) {
      this.ctx.fillStyle = '#ffd700'; this.ctx.font = `bold ${Math.floor(W * 0.042)}px Segoe UI`;
      this.ctx.fillText(`⭐ Highscore: ${Math.floor(this.highscore)}`, W / 2, H * 0.77);
    }
  }

  drawGameOver(W, H) {
    this.ctx.fillStyle = 'rgba(0,0,0,0.75)'; this.ctx.fillRect(0, 0, W, H);
    this.ctx.textAlign = 'center'; this.ctx.font = `${Math.floor(H * 0.10)}px serif`;
    this.ctx.fillText('💥', W / 2, H * 0.28);
    this.ctx.font = `bold ${Math.floor(H * 0.07)}px Segoe UI`; this.ctx.fillStyle = '#ff4444';
    this.ctx.fillText('Crash!', W / 2, H * 0.37);
    this.ctx.font = `bold ${Math.floor(H * 0.05)}px Segoe UI`; this.ctx.fillStyle = '#ffd700';
    this.ctx.fillText(`⭐ ${Math.floor(this.player.score)} Punkte`, W / 2, H * 0.47);

    const bw = W*0.55, bh = H*0.09, bx = W/2 - bw/2, by = H*0.725 - bh/2;
    this.ctx.fillStyle = '#444'; this.ctx.beginPath(); this.ctx.roundRect(bx, by, bw, bh, bh*0.3); this.ctx.fill();
    this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2; this.ctx.stroke();
    this.ctx.fillStyle = '#fff'; this.ctx.font = `bold ${Math.floor(bh * 0.45)}px Segoe UI`;
    this.ctx.fillText('🔄 Noch mal!', W/2, H*0.725 + bh*0.15);
  }

  drawWin(W, H) {
    this.ctx.fillStyle = 'rgba(0,0,0,0.8)'; this.ctx.fillRect(0, 0, W, H);
    this.ctx.textAlign = 'center'; this.ctx.font = `${Math.floor(H * 0.12)}px serif`;
    this.ctx.fillText('🎉', W / 2, H * 0.18);
    this.ctx.font = `bold ${Math.floor(H * 0.09)}px Segoe UI`; this.ctx.fillStyle = '#ffd700';
    this.ctx.shadowColor = '#000'; this.ctx.shadowBlur = 10;
    this.ctx.fillText('Zeeland!', W / 2, H * 0.30);
    this.ctx.shadowBlur = 0;
    this.ctx.font = `${Math.floor(H * 0.048)}px Segoe UI`; this.ctx.fillStyle = '#fff';
    this.ctx.fillText('Dormio Strand Resort 🏖️', W / 2, H * 0.39);
    this.ctx.font = `bold ${Math.floor(H * 0.055)}px Segoe UI`; this.ctx.fillStyle = '#ffd700';
    this.ctx.fillText(`⭐ ${Math.floor(this.player.score).toLocaleString('de-DE')} Punkte`, W / 2, H * 0.48);

    const bw = W*0.55, bh = H*0.09, bx = W/2 - bw/2, by = H*0.725 - bh/2;
    this.ctx.fillStyle = '#444'; this.ctx.beginPath(); this.ctx.roundRect(bx, by, bw, bh, bh*0.3); this.ctx.fill();
    this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2; this.ctx.stroke();
    this.ctx.fillStyle = '#fff'; this.ctx.font = `bold ${Math.floor(bh * 0.45)}px Segoe UI`;
    this.ctx.fillText('🔄 Erneut fahren!', W/2, H*0.725 + bh*0.15);
  }

  loop(timestamp) {
    const dt = (timestamp - this.lastTime) / 1000;
    this.lastTime = timestamp;
    this.update(dt);
    this.draw();
    requestAnimationFrame(this.loop);
  }
}

// Boot
const game = new Game(document.getElementById('c'));
</script>
</body>
