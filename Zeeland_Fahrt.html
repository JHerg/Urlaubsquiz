// ─── Object Pool ─────────────────────────────────────────────────────────────
class Pool {
  constructor(size, factory) {
    this.items = Array.from({ length: size }, factory);
    this.index = 0;
  }
  spawn() {
    for (let i = 0; i < this.items.length; i++) {
      const item = this.items[(this.index + i) % this.items.length];
      if (!item.alive) { this.index = (this.index + i + 1) % this.items.length; item.alive = true; return item; }
    }
    return null;
  }
  forEach(cb) { for (let i = 0; i < this.items.length; i++) { if (this.items[i].alive) cb(this.items[i]); } }
  reset() { this.items.forEach(it => it.alive = false); }
}

// ─── Input ────────────────────────────────────────────────────────────────────
class InputManager {
  constructor(canvas) {
    this.keys = {}; this.touchLeft = false; this.touchRight = false;
    this.gyroValue = 0; this.gyroAvailable = false;
    document.addEventListener('keydown', e => this.keys[e.code] = true);
    document.addEventListener('keyup',   e => this.keys[e.code] = false);
    this.handleTouches = (touches) => {
      this.touchLeft = false; this.touchRight = false;
      const rect = canvas.getBoundingClientRect();
      for (const t of touches) {
        if (t.clientX - rect.left < canvas.width / 2) this.touchLeft = true;
        else this.touchRight = true;
      }
    };
  }
  getSteer() {
    let s = 0;
    if (this.keys['ArrowLeft'] || this.keys['KeyA']) s -= 1;
    if (this.keys['ArrowRight'] || this.keys['KeyD']) s += 1;
    if (this.touchLeft) s -= 1;
    if (this.touchRight) s += 1;
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (const pad of pads) { if (pad?.axes?.length > 0 && Math.abs(pad.axes[0]) > 0.1) s += pad.axes[0]; }
    if (this.gyroAvailable && Math.abs(this.gyroValue) > 0.05) s += this.gyroValue;
    return Math.max(-1, Math.min(1, s));
  }
  setupGyro() {
    window.addEventListener('deviceorientation', e => {
      if (e.gamma !== null) { this.gyroAvailable = true; this.gyroValue = Math.max(-1, Math.min(1, e.gamma / 30)); }
    });
  }
}

// ─── Game ─────────────────────────────────────────────────────────────────────
class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.input = new InputManager(canvas);

    this.obstacles = new Pool(80,  () => ({ alive: false, z: 0, laneX: 0, type: null, isSight: false, sightData: null }));
    this.landmarks = new Pool(100, () => ({ alive: false, z: 0, side: 0, emoji: '', name: '', kind: '' }));
    this.particles = new Pool(150, () => ({ alive: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1, color: '', r: 0 }));
    this.clouds    = new Pool(20,  () => ({ alive: false, x: 0, y: 0, w: 0, h: 0, speed: 0 }));
    this.comets    = new Pool(15,  () => ({ alive: false, x: 0, y: 0, vx: 0, vy: 0, tailLen: 0, life: 0, size: 0 }));

    this.state      = 'menu';
    this.highscore  = 0;
    this.lastTime   = performance.now();
    this.cometTimer = 0;
    this.sightPopup = null;        // aktives Info-Popup für Sehenswürdigkeit
    this.spawnedSights = new Set();// welche Sight-Events schon gespawnt

    this.player   = { pos: 0, x: 0, speed: 3, lives: 3, score: 0, invincible: 0 };
    this.gameLogic = { currentZone: 0, zoneAnnounce: null, nextWaveZ: 0,
                       curveStrength: 0, pitch: 0, drawDistance: 4000 };

    this.resize = () => {
      const mob = window.innerWidth <= 520 || window.innerHeight > window.innerWidth;
      this.canvas.width  = mob ? window.innerWidth  : Math.min(480, window.innerWidth);
      this.canvas.height = window.innerHeight;
    };
    window.addEventListener('resize', this.resize);
    this.resize();

    // Click
    this.canvas.addEventListener('click', e => this.handleClick(e));

    // Touch
    this.canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      // Popup schließen — irgendwo tippen
      if (this.sightPopup) { this.sightPopup = null; return; }
      if (this.state === 'menu' || this.state === 'over') { this.startGame(); return; }
      if (this.state === 'win') {
        const t = e.touches[0], rect = this.canvas.getBoundingClientRect();
        const tx = t.clientX - rect.left, ty = t.clientY - rect.top;
        const H = this.canvas.height, W = this.canvas.width;
        if (ty > H * 0.86 && ty < H * 0.96 && tx > W * 0.2 && tx < W * 0.8) this.startGame();
        return;
      }
      this.input.handleTouches(e.touches);
    }, { passive: false });
    this.canvas.addEventListener('touchmove', e => { e.preventDefault(); this.input.handleTouches(e.touches); }, { passive: false });
    this.canvas.addEventListener('touchend',  e => {
      e.preventDefault(); this.input.touchLeft = false; this.input.touchRight = false;
      this.input.handleTouches(e.touches);
    }, { passive: false });

    this.loop = this.loop.bind(this);
    requestAnimationFrame(this.loop);
  }

  handleClick(e) {
    if (this.sightPopup) { this.sightPopup = null; return; }
    const rect = this.canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const W = this.canvas.width, H = this.canvas.height;
    if (this.state === 'menu' && y > H*0.52 && y < H*0.65 && x > W*0.2 && x < W*0.8) this.startGame();
    if (this.state === 'over' && y > H*0.65 && y < H*0.80 && x > W*0.2 && x < W*0.8) this.startGame();
    if (this.state === 'win'  && y > H*0.86 && y < H*0.96 && x > W*0.2 && x < W*0.8) this.startGame();
  }

  startGame() {
    this.obstacles.reset(); this.landmarks.reset(); this.particles.reset();
    this.clouds.reset();    this.comets.reset();
    this.player    = { pos: 0, x: 0, speed: 3, lives: 3, score: 0, invincible: 0 };
    this.gameLogic.currentZone = 0; this.gameLogic.zoneAnnounce = null; this.gameLogic.nextWaveZ = 4500;
    this.sightPopup   = null;
    this.spawnedSights = new Set();
    this.state = 'game';

    for (let i = 0; i < 6; i++) this.spawnCloud();
    for (let i = 0; i < 24; i++) {
      const lm = this.landmarks.spawn();
      if (lm) { lm.z = 500 + i*400 + Math.random()*200; lm.side = i%2===0?-1:1; lm.emoji = ['🌳','🌲','🌳'][i%3]; lm.kind = 'tree'; }
    }
    this.announceZone(0);
    for (let i = 0; i < 3; i++) this.spawnSingleObstacle(3500 + i * 1200);

    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(p => { if (p === 'granted') this.input.setupGyro(); }).catch(() => {});
    } else this.input.setupGyro();
  }

  // ─── Spawn helpers ─────────────────────────────────────────────────────────
  spawnComet() {
    const c = this.comets.spawn(); if (!c) return;
    const fl = Math.random() > 0.5;
    c.x = fl ? -0.05 : 1.05; c.y = 0.04 + Math.random()*0.38;
    c.vx = (fl?1:-1)*(0.18+Math.random()*0.22); c.vy = 0.04+Math.random()*0.08;
    c.tailLen = 0.12+Math.random()*0.12; c.life = 1.0; c.size = 1.5+Math.random()*2;
  }
  spawnCloud() {
    const c = this.clouds.spawn(); if (!c) return;
    c.x=Math.random(); c.y=0.05+Math.random()*0.35; c.w=0.15+Math.random()*0.20; c.h=0.04+Math.random()*0.06; c.speed=0.00003+Math.random()*0.00004;
  }

  // Einzelnes Hindernis (Einzel-Spawn beim Start)
  spawnSingleObstacle(zOff) {
    const obs = this.obstacles.spawn(); if (!obs) return;
    obs.type = DAMAGE_TYPES[Math.floor(Math.random()*DAMAGE_TYPES.length)];
    obs.laneX = [-0.55, 0, 0.55][Math.floor(Math.random()*3)];
    obs.z = this.player.pos + zOff;
    obs.isSight = false; obs.sightData = null;
  }

  // Wellen-basiertes Spawning: max 2/3 Spuren, gestaffelt
  spawnWave() {
    const fillCount = Math.random() < 0.6 ? 1 : 2;
    const indices = [0,1,2].sort(()=>Math.random()-0.5).slice(0, fillCount);
    const zone = this.gameLogic.currentZone;
    const zoneCols = ZONE_COLLECTIBLES[zone] || ZONE_COLLECTIBLES[0];

    indices.forEach((idx, wi) => {
      const obs = this.obstacles.spawn(); if (!obs) return;
      if (Math.random() < 0.35) {
        // Zonen-spezifisches Sammelobjekt
        const col = zoneCols[Math.floor(Math.random()*zoneCols.length)];
        obs.type = { emoji: col.emoji, damage: false, score: col.score, width: 0.22, speed: 0.0, name: col.name };
      } else {
        obs.type = DAMAGE_TYPES[Math.floor(Math.random()*DAMAGE_TYPES.length)];
      }
      obs.laneX = [-0.55, 0, 0.55][idx];
      obs.z = this.player.pos + 5500 + wi * 1400 + Math.random()*300;
      obs.isSight = false; obs.sightData = null;
    });
    this.gameLogic.nextWaveZ = this.player.pos + 5500 + (indices.length-1)*1400 + 1100 + Math.random()*600;
  }

  // Sehenswürdigkeits-Abstecher auf der Straße spawnen
  spawnSightEvent(ev) {
    const obs = this.obstacles.spawn(); if (!obs) return;
    obs.type = { emoji: ev.emoji, damage: false, score: 150, width: 0.18, speed: 0.0 };
    obs.laneX = ev.side * 0.78; // Goldene Spur außen
    obs.z = ev.triggerDist;
    obs.isSight = true;
    obs.sightData = ev;
  }

  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.particles.spawn(); if (!p) continue;
      const a = Math.random()*Math.PI*2, sp = 80+Math.random()*120;
      p.x=x; p.y=y; p.vx=Math.cos(a)*sp; p.vy=Math.sin(a)*sp;
      p.life=0.5+Math.random()*0.4; p.maxLife=0.9; p.color=color; p.r=3+Math.random()*4;
    }
  }

  announceZone(idx) {
    this.gameLogic.zoneAnnounce = { idx, timer: 2.5, alpha: 0 };
    this.player.score += 200;
    // Schilder
    (ZONE_LANDMARKS[idx]||[]).forEach((lmData, i) => {
      const lm = this.landmarks.spawn(); if (!lm) return;
      lm.z = this.player.pos + 1400 + i*1600; lm.side = lmData.side;
      lm.emoji = lmData.emoji; lm.name = lmData.name; lm.kind = 'sign';
    });
    // Bäume
    for (let i = 0; i < 14; i++) {
      const lm = this.landmarks.spawn(); if (!lm) return;
      lm.z = this.player.pos + 800 + i*480 + Math.random()*200;
      lm.side = i%2===0?-1:1; lm.emoji = ['🌳','🌲','🌴','🌳','🌲'][Math.floor(Math.random()*5)];
      lm.kind = 'tree';
    }
    // Ziellinie vor Zeeland
    if (idx === 6) {
      const fin = this.landmarks.spawn();
      if (fin) { fin.z = 37800; fin.side = 0; fin.emoji = ''; fin.name = 'ZIEL'; fin.kind = 'finish'; }
    }
  }

  // ─── Update ────────────────────────────────────────────────────────────────
  update(dt) {
    if (this.state !== 'game') return;
    if (this.sightPopup) {
      // Spiel im Hintergrund fast eingefroren wenn Popup offen
      dt = 0; return;
    }
    dt = Math.min(dt, 0.05);

    this.player.speed = Math.min(9, 2.5 + this.player.pos / 6500);
    this.gameLogic.curveStrength = Math.sin(this.player.pos/3000)*1.5 + Math.sin(this.player.pos/5000)*1.0;
    this.gameLogic.pitch = Math.cos(this.player.pos/2500)*50;

    const centrifugalForce = this.gameLogic.curveStrength * (this.player.speed/9) * 2.2 * dt;
    let steer = this.input.getSteer();
    this.player.x += steer * 3.6 * dt;
    this.player.x -= centrifugalForce;
    if (Math.abs(steer) < 0.05) this.player.x *= Math.pow(0.85, dt*60);
    this.player.x = Math.max(-0.85, Math.min(0.85, this.player.x)); // etwas weiter für Abstecher-Spur

    this.player.pos   += this.player.speed * 60 * dt;
    this.player.score += this.player.speed * dt * 10;

    // Zonen-Wechsel
    for (let i = ZONES.length-1; i >= 0; i--) {
      if (this.player.pos >= ZONES[i].dist && this.gameLogic.currentZone < i) {
        this.gameLogic.currentZone = i; this.announceZone(i); break;
      }
    }
    if (this.player.invincible > 0) this.player.invincible -= dt*60;

    // Zone-Announce Timer
    if (this.gameLogic.zoneAnnounce) {
      const za = this.gameLogic.zoneAnnounce; za.timer -= dt;
      if (za.timer > 2.0) za.alpha = Math.min(1, (2.5-za.timer)*4);
      else if (za.timer < 0.5) za.alpha = Math.max(0, za.timer*2);
      else za.alpha = 1;
      if (za.timer <= 0) this.gameLogic.zoneAnnounce = null;
    }

    // Sight-Events spawnen (einmalig per Event)
    SIGHT_EVENTS.forEach(ev => {
      const key = ev.zone + '_' + ev.triggerDist;
      if (!this.spawnedSights.has(key) && this.player.pos >= ev.triggerDist - 4000 && this.player.pos < ev.triggerDist) {
        this.spawnedSights.add(key);
        this.spawnSightEvent(ev);
      }
    });

    // Hindernisse bewegen
    this.obstacles.forEach(obs => {
      obs.z -= obs.type.speed * this.player.speed * 60 * dt;
      if (obs.z < this.player.pos - 200) obs.alive = false;
    });

    // Wellen-Spawn
    if (this.player.pos + 5500 >= this.gameLogic.nextWaveZ) this.spawnWave();

    // Kollision
    if (this.player.invincible <= 0) {
      this.obstacles.forEach(obs => {
        const dz = obs.z - this.player.pos;
        if (dz > -150 && dz < 400) {
          const dx = Math.abs(this.player.x - obs.laneX);
          const hitRadius = obs.type.width * 0.6;
          if (dx < hitRadius) {
            obs.alive = false;
            const carY = this.canvas.height * 0.78;
            if (obs.isSight) {
              // Sehenswürdigkeit eingesammelt → Popup
              this.sightPopup = obs.sightData;
              this.player.score += obs.type.score;
              this.spawnParticles(this.canvas.width/2, carY, '#ffd700', 20);
            } else if (obs.type.damage) {
              this.player.lives--;
              this.player.invincible = 120;
              this.spawnParticles(this.canvas.width/2, carY, '#ff4444', 18);
              if (this.player.lives <= 0) {
                if (this.player.score > this.highscore) this.highscore = Math.floor(this.player.score);
                this.state = 'over';
              }
            } else {
              this.player.score += obs.type.score;
              this.spawnParticles(this.canvas.width/2, carY, '#ffd700', 12);
            }
          }
        }
      });
    }

    // Bäume recyceln
    this.landmarks.forEach(lm => { if (lm.z < this.player.pos-800) lm.alive = false; });
    let treesAhead = 0, lastZ = this.player.pos + 2000;
    this.landmarks.forEach(lm => { if (lm.kind==='tree' && lm.z>this.player.pos+2000) { treesAhead++; if (lm.z>lastZ) lastZ=lm.z; } });
    if (treesAhead < 8) {
      for (let i = 0; i < 6; i++) {
        const lm = this.landmarks.spawn(); if (!lm) continue;
        lm.z = lastZ+400+i*400+Math.random()*200; lm.side = Math.random()>0.5?-1:1;
        lm.emoji = ['🌳','🌲','🌳','🌲'][Math.floor(Math.random()*4)]; lm.kind='tree';
      }
    }

    // Partikel / Wolken / Kometen
    this.particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=150*dt; p.life-=dt; if(p.life<=0) p.alive=false; });
    this.clouds.forEach(c => { c.x+=c.speed*this.player.speed*60*dt; if(c.x>1.3) c.x=-0.3; });
    this.cometTimer -= dt;
    if (this.cometTimer <= 0) { this.spawnComet(); this.cometTimer = 3+Math.random()*6; }
    this.comets.forEach(c => {
      c.x+=c.vx*dt; c.y+=c.vy*dt;
      if (c.x<-0.2||c.x>1.2||c.y>0.5) c.alive=false; else c.life-=dt*0.4;
      if (c.life<=0) c.alive=false;
    });

    if (this.player.pos >= 38000) {
      this.player.score += 1000;
      if (this.player.score > this.highscore) this.highscore = Math.floor(this.player.score);
      this.state = 'win';
    }
  }

  // ─── Projektion ────────────────────────────────────────────────────────────
  getProjection(dz, playerX, curve, W, horizonY, roadBottom) {
    const z = dz/1000 + 0.5;
    const scale = 1/z;
    const dx = curve * (dz*dz) * 0.00015;
    const perspX = (dx - playerX*400) * scale;
    const camH = (roadBottom - horizonY) * 0.5;
    return { x: W/2 + perspX*(W/1000), y: horizonY + camH*scale, w: W*0.8*scale, scale };
  }

  // ─── Draw ──────────────────────────────────────────────────────────────────
  draw() {
    const W = this.canvas.width, H = this.canvas.height;
    if (this.state === 'menu') { this.drawMenu(W, H); return; }
    this.drawGameScene(W, H);
    if (this.state === 'over') this.drawGameOver(W, H);
    else if (this.state === 'win') this.drawWin(W, H);
    // Popup über alles
    if (this.sightPopup) this.drawSightPopup(W, H);
  }

  drawGameScene(W, H) {
    const zone = ZONES[this.gameLogic.currentZone];
    const horizonY = H*0.45 - this.gameLogic.pitch*(H/800);
    const roadBottom = H;
    const zMax = this.gameLogic.drawDistance;

    // Himmel
    const sky = this.ctx.createLinearGradient(0, 0, 0, Math.max(0, horizonY));
    sky.addColorStop(0, zone.skyTop); sky.addColorStop(1, zone.skyBot);
    this.ctx.fillStyle = sky; this.ctx.fillRect(0, 0, W, horizonY);

    // Wolken
    this.clouds.forEach(c => {
      this.ctx.globalAlpha = 0.6;
      const cx=c.x*W, cy=c.y*H*0.45, cw=c.w*W, ch=c.h*H*0.45;
      this.ctx.fillStyle = '#fff';
      [[0,0,1,1],[-.3,.1,.6,.8],[.3,.15,.5,.75]].forEach(([ox,oy,sw,sh]) => {
        this.ctx.beginPath(); this.ctx.ellipse(cx+ox*cw, cy+oy*ch, cw*sw, ch*sh, 0, 0, Math.PI*2); this.ctx.fill();
      });
      this.ctx.globalAlpha = 1;
    });

    // Zonen-Emoji am Himmel
    this.ctx.font = `${Math.floor(H*0.08)}px serif`; this.ctx.textAlign='center'; this.ctx.globalAlpha=0.5;
    this.ctx.fillText(zone.emoji, W*0.15, horizonY*0.55); this.ctx.globalAlpha=1;

    // Gebäude-Silhouette
    const silOff = (-this.player.pos*0.05 - this.gameLogic.curveStrength*W*0.1) % W;
    this.ctx.fillStyle = 'rgba(0,0,0,0.30)'; this.ctx.save(); this.ctx.translate(silOff, 0);
    for (let i=0; i<2; i++) {
      this.ctx.beginPath();
      this.ctx.moveTo(i*W, horizonY); this.ctx.lineTo(i*W+W*0.1, horizonY-H*0.08);
      this.ctx.lineTo(i*W+W*0.3, horizonY-H*0.03); this.ctx.lineTo(i*W+W*0.5, horizonY-H*0.1);
      this.ctx.lineTo(i*W+W*0.8, horizonY-H*0.04); this.ctx.lineTo(i*W+W, horizonY); this.ctx.fill();
    }
    this.ctx.restore();

    // ── Abstecher-Spur Vorschau (goldener Streifen, wenn Sight-Event nah) ──
    let nearSight = null;
    this.obstacles.forEach(obs => {
      if (obs.isSight && obs.alive) {
        const dz = obs.z - this.player.pos;
        if (dz > 0 && dz < 3000) nearSight = obs;
      }
    });

    // 3D Straße
    const segs = 45;
    for (let i = segs-1; i >= 0; i--) {
      const dz1 = (i/segs)*zMax, dz2 = ((i+1)/segs)*zMax;
      const p1 = this.getProjection(dz1, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);
      const p2 = this.getProjection(dz2, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);
      const gZ = this.player.pos + dz1;
      const dk = Math.floor(gZ/200)%2===0;

      // Gras
      this.ctx.fillStyle = dk ? zone.grassA : zone.grassB;
      this.ctx.fillRect(0, p2.y-1, W, p1.y-p2.y+2);

      // Asphalt
      this.ctx.fillStyle = dk ? '#555' : '#4a4a4a';
      this.ctx.beginPath();
      this.ctx.moveTo(p1.x-p1.w/2,p1.y); this.ctx.lineTo(p1.x+p1.w/2,p1.y);
      this.ctx.lineTo(p2.x+p2.w/2,p2.y); this.ctx.lineTo(p2.x-p2.w/2,p2.y); this.ctx.fill();

      // Rüttelstreifen
      const rW1=p1.w*0.08, rW2=p2.w*0.08;
      this.ctx.fillStyle = dk ? '#cc0000' : '#ffffff';
      [[p1.x-p1.w/2, p2.x-p2.w/2, rW1, rW2, 1],[p1.x+p1.w/2-rW1, p2.x+p2.w/2-rW2, rW1, rW2, -1]].forEach(([x1,x2,w1,w2,dir]) => {
        this.ctx.beginPath();
        this.ctx.moveTo(x1,p1.y); this.ctx.lineTo(x1+w1,p1.y);
        this.ctx.lineTo(x2+w2,p2.y); this.ctx.lineTo(x2,p2.y); this.ctx.fill();
      });

      // Spurmarkierungen
      if (!dk) {
        this.ctx.fillStyle='#fff';
        const lW1=p1.w*0.02, lW2=p2.w*0.02;
        [-1/6, 1/6].forEach(rel => {
          const x1=p1.x+p1.w*rel, x2=p2.x+p2.w*rel;
          this.ctx.beginPath();
          this.ctx.moveTo(x1-lW1/2,p1.y); this.ctx.lineTo(x1+lW1/2,p1.y);
          this.ctx.lineTo(x2+lW2/2,p2.y); this.ctx.lineTo(x2-lW2/2,p2.y); this.ctx.fill();
        });
      }

      // Goldene Abstecher-Spur (wenn Sight-Event nah) ────────────────────────
      if (nearSight) {
        const evDz = nearSight.z - this.player.pos;
        if (dz1 < evDz) { // nur bis zur Sight-Position zeichnen
          const side = nearSight.laneX > 0 ? 1 : -1;
          const sW1 = p1.w * 0.14, sW2 = p2.w * 0.14;
          // Goldener Streifen außen neben dem Rüttelstreifen
          const sX1 = side > 0 ? p1.x + p1.w/2 : p1.x - p1.w/2 - sW1;
          const sX2 = side > 0 ? p2.x + p2.w/2 : p2.x - p2.w/2 - sW2;
          const pulse = 0.4 + 0.3 * Math.sin(Date.now()/250 + dz1*0.01);
          this.ctx.fillStyle = `rgba(255,200,0,${pulse})`;
          this.ctx.beginPath();
          this.ctx.moveTo(sX1, p1.y); this.ctx.lineTo(sX1 + sW1*side, p1.y);
          this.ctx.lineTo(sX2 + sW2*side, p2.y); this.ctx.lineTo(sX2, p2.y);
          this.ctx.fill();
        }
      }
    }

    // ── Objekte sortieren & zeichnen ─────────────────────────────────────────
    const drawList = [];
    this.obstacles.forEach(obs => { const dz=obs.z-this.player.pos; if(dz>0&&dz<zMax) drawList.push({type:'obs',item:obs,dz}); });
    this.landmarks.forEach(lm  => { const dz=lm.z -this.player.pos; if(dz>0&&dz<zMax) drawList.push({type:'lm', item:lm, dz}); });
    drawList.sort((a,b)=>b.dz-a.dz);

    drawList.forEach(obj => {
      const p = this.getProjection(obj.dz, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);

      if (obj.type === 'obs') {
        const o = obj.item;
        const screenX = p.x + o.laneX * (p.w/2);
        const baseSize = Math.max(12, 120*(p.scale/2)*(H/600));

        if (o.isSight) {
          // ── Sehenswürdigkeit-Abstecher: goldenes Glühen ─────────────────
          const pulse = 0.6 + 0.4*Math.sin(Date.now()/300);
          // Äußerer Glow-Ring
          this.ctx.save();
          this.ctx.globalAlpha = 0.35 * pulse;
          this.ctx.fillStyle = '#ffd700';
          this.ctx.beginPath();
          this.ctx.arc(screenX, p.y - baseSize*0.5, baseSize*0.9, 0, Math.PI*2);
          this.ctx.fill();
          this.ctx.globalAlpha = 1;
          // Goldene Pille
          const bW = baseSize*1.4, bH = baseSize*1.3;
          this.ctx.fillStyle = `rgba(180,130,0,0.85)`;
          this.ctx.strokeStyle = `rgba(255,220,0,${pulse})`;
          this.ctx.lineWidth = Math.max(2, baseSize*0.07);
          this.ctx.beginPath();
          this.ctx.roundRect(screenX-bW/2, p.y-baseSize-bH*0.15, bW, bH, bH*0.3);
          this.ctx.fill(); this.ctx.stroke();
          // Pfeil-Label oben
          if (baseSize > 20) {
            const arrowSide = o.laneX > 0 ? '→' : '←';
            this.ctx.fillStyle = '#fff';
            this.ctx.font = `bold ${Math.max(10, baseSize*0.38)}px Segoe UI`;
            this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'bottom';
            this.ctx.fillText(`${arrowSide} ABSTECHER`, screenX, p.y - baseSize*1.1);
            const ev = o.sightData;
            if (ev && baseSize > 26) {
              this.ctx.fillStyle = '#ffd700';
              this.ctx.font = `${Math.max(8, baseSize*0.32)}px Segoe UI`;
              this.ctx.fillText(ev.name, screenX, p.y - baseSize*1.45);
            }
          }
          this.ctx.restore();
          // Emoji
          this.ctx.font = `${baseSize}px serif`;
          this.ctx.textAlign='center'; this.ctx.textBaseline='bottom';
          this.ctx.fillText(o.type.emoji, screenX, p.y);

        } else {
          // ── Normales Hindernis / Sammelobjekt ───────────────────────────
          const bgAlpha = Math.min(0.78, p.scale*1.4);
          const pad = baseSize*0.16;
          const boxW = baseSize*1.12 + pad*2, boxH = baseSize + pad*1.7;
          if (o.type.damage) {
            this.ctx.fillStyle = `rgba(180,40,0,${bgAlpha*0.72})`;
            this.ctx.strokeStyle = `rgba(255,110,20,${bgAlpha})`;
          } else {
            // Sammelobjekt: Farbe passend zur Zone
            this.ctx.fillStyle = `rgba(0,120,70,${bgAlpha*0.65})`;
            this.ctx.strokeStyle = `rgba(0,220,120,${bgAlpha})`;
          }
          this.ctx.lineWidth = Math.max(1.2, baseSize*0.05);
          this.ctx.beginPath();
          this.ctx.roundRect(screenX-boxW/2, p.y-baseSize-pad, boxW, boxH, boxH*0.26);
          this.ctx.fill(); this.ctx.stroke();
          // Sammelobjekt: Name klein darunter
          if (!o.type.damage && o.type.name && baseSize > 22) {
            this.ctx.fillStyle = '#fff';
            this.ctx.font = `bold ${Math.max(8, baseSize*0.28)}px Segoe UI`;
            this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'top';
            this.ctx.fillText(o.type.name, screenX, p.y + 2);
          }
          // Schatten + Emoji
          this.ctx.font = `${baseSize}px serif`;
          this.ctx.textAlign='center'; this.ctx.textBaseline='bottom';
          this.ctx.fillStyle='rgba(0,0,0,0.3)';
          this.ctx.beginPath(); this.ctx.ellipse(screenX, p.y+2, baseSize*0.38, baseSize*0.09, 0, 0, Math.PI*2); this.ctx.fill();
          this.ctx.fillText(o.type.emoji, screenX, p.y);
        }

      } else {
        // ── Landmarks ──────────────────────────────────────────────────────
        const lm = obj.item;
        const side = lm.kind==='tree'?0.75:0.85;
        const screenX = p.x + lm.side*(p.w*side);
        this.ctx.globalAlpha = obj.dz > zMax-500 ? (zMax-obj.dz)/500 : 1;

        if (lm.kind==='tree') {
          const sz = Math.max(16, 280*p.scale*(H/800));
          this.ctx.font=`${sz}px serif`; this.ctx.textAlign='center'; this.ctx.textBaseline='bottom';
          this.ctx.fillText(lm.emoji, screenX, p.y+sz*0.05);

        } else if (lm.kind==='finish') {
          const banH = Math.max(20, 240*p.scale*(H/800));
          const banW = p.w*1.4;
          const banY = p.y - banH*2.0;
          // Pfähle
          this.ctx.fillStyle='#222';
          const pw = Math.max(3, p.scale*10);
          this.ctx.fillRect(p.x-banW/2, p.y-banH*2.2, pw, banH*2.2);
          this.ctx.fillRect(p.x+banW/2-pw, p.y-banH*2.2, pw, banH*2.2);
          // Schachbrett
          const cells=10, cW=banW/cells, cH=banH*0.45;
          for (let c=0;c<cells;c++) for (let r=0;r<2;r++) {
            this.ctx.fillStyle = (c+r)%2===0?'#000':'#fff';
            this.ctx.fillRect(p.x-banW/2+c*cW, banY+r*cH, cW, cH);
          }
          // Text
          this.ctx.fillStyle='#ffd700'; this.ctx.strokeStyle='#000';
          this.ctx.lineWidth=Math.max(1,p.scale*2);
          this.ctx.font=`bold ${Math.max(14,banH*0.55)}px Segoe UI`;
          this.ctx.textAlign='center'; this.ctx.textBaseline='middle';
          this.ctx.strokeText('🏁 ZIEL 🏁', p.x, banY+banH*1.25);
          this.ctx.fillText('🏁 ZIEL 🏁',   p.x, banY+banH*1.25);

        } else {
          // Sehenswürdigkeits-Schild
          const sH = Math.max(22, 240*p.scale*(H/800)), sW = sH*2.6;
          const col = lm.side>0 ? '#1565c0' : '#2e7d32';
          this.ctx.fillStyle='#555';
          const pw=Math.max(2,p.scale*7);
          this.ctx.fillRect(screenX-sW*0.30, p.y-sH*1.4, pw, sH*1.4);
          this.ctx.fillRect(screenX+sW*0.30, p.y-sH*1.4, pw, sH*1.4);
          this.ctx.fillStyle='rgba(0,0,0,0.4)';
          this.ctx.beginPath(); this.ctx.roundRect(screenX-sW/2+3, p.y-sH*2.6+3, sW, sH, 5); this.ctx.fill();
          this.ctx.fillStyle=col;
          this.ctx.beginPath(); this.ctx.roundRect(screenX-sW/2, p.y-sH*2.6, sW, sH, 5); this.ctx.fill();
          this.ctx.strokeStyle='#fff'; this.ctx.lineWidth=Math.max(1.5,p.scale*4); this.ctx.stroke();
          // Emoji
          this.ctx.font=`${sH*0.68}px serif`; this.ctx.textAlign='center'; this.ctx.textBaseline='middle';
          this.ctx.fillText(lm.emoji, screenX-sW*0.30, p.y-sH*2.1);
          // Name
          const fS=sH*0.30;
          if (fS>6) {
            this.ctx.fillStyle='#fff'; this.ctx.font=`bold ${fS}px Segoe UI`;
            this.ctx.textAlign='left'; this.ctx.textBaseline='middle';
            this.ctx.fillText(lm.name, screenX-sW*0.08, p.y-sH*2.1);
          }
        }
        this.ctx.globalAlpha=1;
      }
    });
    this.ctx.textBaseline='alphabetic';

    // ── Spielerposition-Pfeil ─────────────────────────────────────────────────
    {
      const arP = this.getProjection(200, this.player.x, this.gameLogic.curveStrength, W, horizonY, roadBottom);
      const arX = arP.x + this.player.x*(arP.w/2);
      const arH = arP.w*0.10, arW = arH*0.75;
      const flash = this.player.invincible>0 ? (Math.floor(this.player.invincible/6)%2===0) : false;
      this.ctx.save();
      this.ctx.globalAlpha = flash ? 0.25 : 0.85;
      this.ctx.fillStyle = this.player.invincible>0 ? '#ff4444' : '#44ffaa';
      this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = Math.max(1.5, arH*0.08);
      this.ctx.beginPath();
      this.ctx.moveTo(arX, arP.y);
      this.ctx.lineTo(arX-arW/2, arP.y-arH);
      this.ctx.lineTo(arX-arW*0.15, arP.y-arH*0.65);
      this.ctx.lineTo(arX-arW*0.15, arP.y-arH*1.55);
      this.ctx.lineTo(arX+arW*0.15, arP.y-arH*1.55);
      this.ctx.lineTo(arX+arW*0.15, arP.y-arH*0.65);
      this.ctx.lineTo(arX+arW/2, arP.y-arH);
      this.ctx.closePath(); this.ctx.fill(); this.ctx.stroke();
      this.ctx.restore();
    }

    // ── Cockpit ────────────────────────────────────────────────────────────────
    const hoodTop = roadBottom - H*0.005;
    const hG = this.ctx.createLinearGradient(0,hoodTop,0,H);
    hG.addColorStop(0,'#0d0d0d'); hG.addColorStop(0.5,'#2a2a2a'); hG.addColorStop(1,'#0a0a0a');
    this.ctx.fillStyle=hG;
    this.ctx.beginPath(); this.ctx.moveTo(0,H); this.ctx.lineTo(0,hoodTop);
    this.ctx.quadraticCurveTo(W/2, roadBottom-H*0.06, W, hoodTop);
    this.ctx.lineTo(W,H); this.ctx.fill();

    // Lenkrad
    const wY=roadBottom-H*0.02, wR=W*0.18;
    this.ctx.fillStyle='#111'; this.ctx.beginPath(); this.ctx.arc(W/2,wY,wR,Math.PI,0); this.ctx.fill();
    this.ctx.strokeStyle='#333'; this.ctx.lineWidth=W*0.04; this.ctx.stroke();
    const steer=this.input.getSteer();
    const wA=-Math.PI/2+steer*1.5;
    this.ctx.fillStyle='#ff4444';
    this.ctx.beginPath(); this.ctx.arc(W/2+Math.cos(wA)*wR, wY+Math.sin(wA)*wR, W*0.012, 0, Math.PI*2); this.ctx.fill();

    // Dashboard-Overlay
    {
      const nl = [-.55,0,.55].reduce((b,lx,i)=>Math.abs(this.player.x-lx)<Math.abs(this.player.x-[-.55,0,.55][b])?i:b, 0);
      const liY=H-H*0.085, liCX=W*0.18;
      this.ctx.fillStyle='rgba(255,255,255,0.55)';
      this.ctx.font=`bold ${Math.floor(W*0.022)}px Segoe UI`; this.ctx.textAlign='center';
      this.ctx.fillText('SPUR', liCX, liY-W*0.028);
      [-1,0,1].forEach((off,i)=>{
        const dx=liCX+off*W*0.045, act=(i===nl);
        if (act) {
          this.ctx.save(); this.ctx.globalAlpha=0.35;
          this.ctx.fillStyle=this.player.invincible>0?'#ff4444':'#00ff99';
          this.ctx.beginPath(); this.ctx.arc(dx,liY,W*0.030,0,Math.PI*2); this.ctx.fill();
          this.ctx.restore();
        }
        this.ctx.fillStyle=act?(this.player.invincible>0?'#ff5555':'#00ff99'):'rgba(255,255,255,0.14)';
        this.ctx.beginPath(); this.ctx.arc(dx,liY,W*0.015,0,Math.PI*2); this.ctx.fill();
      });
      // Mini-Tacho
      const sx=W*0.82, sy=H-H*0.07, sr=W*0.06;
      this.ctx.strokeStyle='rgba(255,255,255,0.18)'; this.ctx.lineWidth=sr*0.30; this.ctx.lineCap='round';
      this.ctx.beginPath(); this.ctx.arc(sx,sy,sr,Math.PI*0.75,Math.PI*2.25); this.ctx.stroke();
      const frac=this.player.speed/9;
      this.ctx.strokeStyle=frac>0.8?'#ff3333':frac>0.55?'#ffaa00':'#00dd88';
      this.ctx.beginPath(); this.ctx.arc(sx,sy,sr,Math.PI*0.75,Math.PI*0.75+frac*Math.PI*1.5); this.ctx.stroke();
      this.ctx.lineCap='butt';
      this.ctx.fillStyle='#fff'; this.ctx.font=`bold ${Math.floor(W*0.028)}px Segoe UI`; this.ctx.textAlign='center';
      this.ctx.fillText(`${Math.floor(this.player.speed*20)}`,sx,sy+W*0.010);
      this.ctx.fillStyle='rgba(255,255,255,0.55)'; this.ctx.font=`${Math.floor(W*0.016)}px Segoe UI`;
      this.ctx.fillText('km/h',sx,sy+W*0.030);
    }

    if (this.player.invincible>0 && Math.floor(this.player.invincible/6)%2===0) {
      this.ctx.fillStyle='rgba(255,0,0,0.18)'; this.ctx.fillRect(0,0,W,H);
    }

    // Partikel
    this.particles.forEach(p=>{
      this.ctx.globalAlpha=p.life/p.maxLife; this.ctx.fillStyle=p.color;
      this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.r,0,Math.PI*2); this.ctx.fill();
    });
    this.ctx.globalAlpha=1;

    // ── HUD ────────────────────────────────────────────────────────────────────
    this.ctx.fillStyle='rgba(0,0,0,0.5)'; this.ctx.fillRect(0,0,W,H*0.08);
    let ls=''; for(let i=0;i<this.player.lives;i++) ls+='❤️';
    this.ctx.font=`${Math.floor(H*0.045)}px serif`; this.ctx.textAlign='left'; this.ctx.fillText(ls,8,H*0.062);
    this.ctx.fillStyle='#ffd700'; this.ctx.font=`bold ${Math.floor(H*0.042)}px Segoe UI`; this.ctx.textAlign='center';
    this.ctx.fillText(Math.floor(this.player.score).toLocaleString('de-DE'),W/2,H*0.062);
    this.ctx.font=`${Math.floor(H*0.038)}px serif`; this.ctx.textAlign='right'; this.ctx.fillStyle='#fff';
    this.ctx.fillText(zone.emoji+' '+zone.name, W-8, H*0.062);
    // Fortschrittsbalken
    const prog=Math.min(1,this.player.pos/38000);
    this.ctx.fillStyle='rgba(255,255,255,0.3)'; this.ctx.fillRect(0,H-6,W,6);
    this.ctx.fillStyle='#27ae60'; this.ctx.fillRect(0,H-6,W*prog,6);

    // Abstecher-Hinweis oben (wenn Sight-Event sichtbar)
    if (nearSight) {
      const ev = nearSight.sightData;
      const side = nearSight.laneX > 0 ? 'rechts' : 'links';
      const dz = nearSight.z - this.player.pos;
      const alpha = Math.min(1, (3000-dz)/800);
      this.ctx.save();
      this.ctx.globalAlpha = alpha;
      this.ctx.fillStyle = 'rgba(180,130,0,0.85)';
      this.ctx.strokeStyle = '#ffd700'; this.ctx.lineWidth = 2;
      this.ctx.beginPath(); this.ctx.roundRect(W*0.05, H*0.10, W*0.90, H*0.062, 8);
      this.ctx.fill(); this.ctx.stroke();
      this.ctx.fillStyle = '#fff'; this.ctx.font=`bold ${Math.floor(H*0.028)}px Segoe UI`; this.ctx.textAlign='center';
      this.ctx.fillText(`${ev.emoji}  Abstecher ${side}: ${ev.name}  ${nearSight.laneX>0?'→':'←'}`, W/2, H*0.138);
      this.ctx.restore();
    }

    // Zone-Announcement
    if (this.gameLogic.zoneAnnounce) {
      const za=this.gameLogic.zoneAnnounce;
      this.ctx.globalAlpha=za.alpha;
      this.ctx.fillStyle='rgba(0,0,0,0.6)'; this.ctx.fillRect(0,H*0.35,W,H*0.25);
      this.ctx.textAlign='center';
      this.ctx.font=`${Math.floor(H*0.08)}px serif`; this.ctx.fillText(zone.emoji,W/2,H*0.44);
      this.ctx.font=`bold ${Math.floor(H*0.055)}px Segoe UI`; this.ctx.fillStyle='#fff'; this.ctx.fillText(zone.name,W/2,H*0.52);
      this.ctx.font=`${Math.floor(H*0.030)}px Segoe UI`; this.ctx.fillStyle='#ddd'; this.ctx.fillText(zone.subtitle,W/2,H*0.57);
      this.ctx.globalAlpha=1;
    }
  }

  // ─── Sehenswürdigkeits-Popup ───────────────────────────────────────────────
  drawSightPopup(W, H) {
    const ev = this.sightPopup;
    this.ctx.fillStyle='rgba(0,0,0,0.80)'; this.ctx.fillRect(0,0,W,H);

    const boxW=W*0.88, boxH=H*0.58;
    const boxX=(W-boxW)/2, boxY=(H-boxH)/2 - H*0.04;

    // Box
    const bG=this.ctx.createLinearGradient(boxX,boxY,boxX,boxY+boxH);
    bG.addColorStop(0,'rgba(20,35,60,0.98)'); bG.addColorStop(1,'rgba(10,20,35,0.98)');
    this.ctx.fillStyle=bG;
    this.ctx.strokeStyle='#ffd700'; this.ctx.lineWidth=2.5;
    this.ctx.beginPath(); this.ctx.roundRect(boxX,boxY,boxW,boxH,16); this.ctx.fill(); this.ctx.stroke();

    // Emoji groß
    this.ctx.font=`${Math.floor(H*0.10)}px serif`;
    this.ctx.textAlign='center'; this.ctx.textBaseline='middle';
    this.ctx.fillText(ev.emoji, W/2, boxY + boxH*0.17);

    // Name
    this.ctx.font=`bold ${Math.floor(H*0.045)}px Segoe UI`;
    this.ctx.fillStyle='#ffd700'; this.ctx.textBaseline='alphabetic';
    this.ctx.fillText(ev.name, W/2, boxY + boxH*0.34);

    // Trennlinie
    this.ctx.strokeStyle='rgba(255,215,0,0.3)'; this.ctx.lineWidth=1;
    this.ctx.beginPath();
    this.ctx.moveTo(boxX+boxW*0.1, boxY+boxH*0.38);
    this.ctx.lineTo(boxX+boxW*0.9, boxY+boxH*0.38);
    this.ctx.stroke();

    // Fakten
    this.ctx.fillStyle='#e0e8f0'; this.ctx.font=`${Math.floor(H*0.030)}px Segoe UI`;
    this.ctx.textAlign='left';
    ev.facts.forEach((fact, i) => {
      this.ctx.fillText(fact, boxX+boxW*0.07, boxY + boxH*(0.47 + i*0.145));
    });

    // Punkte-Anzeige
    this.ctx.fillStyle='rgba(0,220,120,0.9)'; this.ctx.textAlign='center';
    this.ctx.font=`bold ${Math.floor(H*0.030)}px Segoe UI`;
    this.ctx.fillText('⭐ +150 Punkte — Abstecher gemacht!', W/2, boxY+boxH*0.86);

    // Weiter-Button
    const bW2=W*0.60, bH2=H*0.064, bX2=W/2-bW2/2, bY2=boxY+boxH*0.91;
    const bGrad=this.ctx.createLinearGradient(bX2,bY2,bX2,bY2+bH2);
    bGrad.addColorStop(0,'#2ecc71'); bGrad.addColorStop(1,'#27ae60');
    this.ctx.fillStyle=bGrad;
    this.ctx.beginPath(); this.ctx.roundRect(bX2,bY2,bW2,bH2,bH2*0.35); this.ctx.fill();
    this.ctx.strokeStyle='rgba(255,255,255,0.5)'; this.ctx.lineWidth=1.5; this.ctx.stroke();
    this.ctx.fillStyle='#fff'; this.ctx.font=`bold ${Math.floor(bH2*0.48)}px Segoe UI`;
    this.ctx.textAlign='center'; this.ctx.textBaseline='middle';
    this.ctx.fillText('Weiterfahren →', W/2, bY2+bH2/2);
    this.ctx.textBaseline='alphabetic';
  }

  // ─── Menü / Game Over / Win ────────────────────────────────────────────────
  drawMenu(W, H) {
    const sky=this.ctx.createLinearGradient(0,0,0,H*0.7);
    sky.addColorStop(0,'#001a40'); sky.addColorStop(1,'#0077be');
    this.ctx.fillStyle=sky; this.ctx.fillRect(0,0,W,H);
    const sea=this.ctx.createLinearGradient(0,H*0.65,0,H);
    sea.addColorStop(0,'#0077be'); sea.addColorStop(1,'#003d6e');
    this.ctx.fillStyle=sea; this.ctx.fillRect(0,H*0.65,W,H*0.35);
    this.ctx.strokeStyle='rgba(255,255,255,0.3)'; this.ctx.lineWidth=2;
    for (let i=0;i<5;i++) {
      const wy=H*(0.68+i*0.06);
      this.ctx.beginPath();
      for (let x=0;x<W;x+=4) { const y=wy+Math.sin(x*0.04+i)*4; x===0?this.ctx.moveTo(x,y):this.ctx.lineTo(x,y); }
      this.ctx.stroke();
    }
    this.ctx.textAlign='center'; this.ctx.fillStyle='#fff';
    this.ctx.font=`bold ${Math.floor(W*0.1)}px Segoe UI`;
    this.ctx.shadowColor='#000'; this.ctx.shadowBlur=8;
    this.ctx.fillText('🌊 Fahrt nach', W/2, H*0.22);
    this.ctx.font=`bold ${Math.floor(W*0.14)}px Segoe UI`; this.ctx.fillStyle='#ffd700';
    this.ctx.fillText('Zeeland!', W/2, H*0.34); this.ctx.shadowBlur=0;
    this.ctx.fillStyle='rgba(255,255,255,0.85)'; this.ctx.font=`${Math.floor(W*0.040)}px Segoe UI`;
    this.ctx.fillText('Köln → Aachen → Belgien → Brüssel', W/2, H*0.41);
    this.ctx.fillText('→ Gent → Brügge → Zeeland 🏖️', W/2, H*0.46);
    // Start-Button
    const bw=W*0.55,bh=H*0.09,bx=W/2-bw/2,by=H*0.575-bh/2;
    const bg=this.ctx.createLinearGradient(bx,by,bx,by+bh);
    bg.addColorStop(0,'#2ecc71'); bg.addColorStop(1,'#27ae60');
    this.ctx.fillStyle=bg; this.ctx.beginPath(); this.ctx.roundRect(bx,by,bw,bh,bh*0.3); this.ctx.fill();
    this.ctx.strokeStyle='rgba(255,255,255,0.4)'; this.ctx.lineWidth=2; this.ctx.stroke();
    this.ctx.fillStyle='#fff'; this.ctx.font=`bold ${Math.floor(bh*0.45)}px Segoe UI`;
    this.ctx.fillText('🚙 Losfahren!', W/2, H*0.575+bh*0.15);
    this.ctx.fillStyle='rgba(255,255,255,0.7)'; this.ctx.font=`${Math.floor(W*0.034)}px Segoe UI`;
    this.ctx.fillText('← → Tasten | Touch | Gamepad | Gyroskop', W/2, H*0.70);
    if (this.highscore>0) {
      this.ctx.fillStyle='#ffd700'; this.ctx.font=`bold ${Math.floor(W*0.042)}px Segoe UI`;
      this.ctx.fillText(`⭐ Highscore: ${Math.floor(this.highscore)}`, W/2, H*0.77);
    }
    // Erklärung Abstecher
    this.ctx.fillStyle='rgba(255,210,0,0.75)'; this.ctx.font=`${Math.floor(W*0.033)}px Segoe UI`;
    this.ctx.fillText('🏛️ Goldene Spur = Sehenswürdigkeit!', W/2, H*0.83);
  }

  drawGameOver(W, H) {
    this.ctx.fillStyle='rgba(0,0,0,0.75)'; this.ctx.fillRect(0,0,W,H);
    this.ctx.textAlign='center';
    this.ctx.font=`${Math.floor(H*0.10)}px serif`; this.ctx.fillText('💥',W/2,H*0.28);
    this.ctx.font=`bold ${Math.floor(H*0.07)}px Segoe UI`; this.ctx.fillStyle='#ff4444'; this.ctx.fillText('Crash!',W/2,H*0.37);
    this.ctx.font=`bold ${Math.floor(H*0.05)}px Segoe UI`; this.ctx.fillStyle='#ffd700';
    this.ctx.fillText(`⭐ ${Math.floor(this.player.score)} Punkte`,W/2,H*0.47);
    const bw=W*0.55,bh=H*0.09,bx=W/2-bw/2,by=H*0.725-bh/2;
    this.ctx.fillStyle='#444'; this.ctx.beginPath(); this.ctx.roundRect(bx,by,bw,bh,bh*0.3); this.ctx.fill();
    this.ctx.strokeStyle='#fff'; this.ctx.lineWidth=2; this.ctx.stroke();
    this.ctx.fillStyle='#fff'; this.ctx.font=`bold ${Math.floor(bh*0.45)}px Segoe UI`;
    this.ctx.fillText('🔄 Noch mal!',W/2,H*0.725+bh*0.15);
  }

  drawWin(W, H) {
    // Strand-Hintergrund
    const sky=this.ctx.createLinearGradient(0,0,0,H*0.50);
    sky.addColorStop(0,'#ff9966'); sky.addColorStop(0.6,'#ffcc99'); sky.addColorStop(1,'#87ceeb');
    this.ctx.fillStyle=sky; this.ctx.fillRect(0,0,W,H*0.50);
    this.ctx.fillStyle='rgba(255,230,150,0.95)';
    this.ctx.beginPath(); this.ctx.arc(W*0.78,H*0.18,W*0.07,0,Math.PI*2); this.ctx.fill();
    const sea=this.ctx.createLinearGradient(0,H*0.50,0,H*0.72);
    sea.addColorStop(0,'#0077be'); sea.addColorStop(1,'#00b4d8');
    this.ctx.fillStyle=sea; this.ctx.fillRect(0,H*0.50,W,H*0.22);
    this.ctx.strokeStyle='rgba(255,255,255,0.5)'; this.ctx.lineWidth=2;
    for (let i=0;i<4;i++) {
      const wy=H*(0.54+i*0.04);
      this.ctx.beginPath();
      for (let x=0;x<W;x+=4) { const y=wy+Math.sin(x*0.05+i+Date.now()*0.001)*3; x===0?this.ctx.moveTo(x,y):this.ctx.lineTo(x,y); }
      this.ctx.stroke();
    }
    const sand=this.ctx.createLinearGradient(0,H*0.72,0,H);
    sand.addColorStop(0,'#e8d5a3'); sand.addColorStop(1,'#d4c48f');
    this.ctx.fillStyle=sand; this.ctx.fillRect(0,H*0.72,W,H*0.28);
    // Overlay
    this.ctx.fillStyle='rgba(0,0,0,0.55)'; this.ctx.fillRect(0,0,W,H);
    this.ctx.textAlign='center';
    // Titel
    this.ctx.font=`${Math.floor(H*0.07)}px serif`; this.ctx.fillText('🎉 🏖️ 🌊',W/2,H*0.09);
    this.ctx.font=`bold ${Math.floor(H*0.060)}px Segoe UI`; this.ctx.fillStyle='#ffd700';
    this.ctx.shadowColor='#000'; this.ctx.shadowBlur=8;
    this.ctx.fillText('Angekommen in Zeeland!',W/2,H*0.15); this.ctx.shadowBlur=0;
    this.ctx.font=`${Math.floor(H*0.030)}px Segoe UI`; this.ctx.fillStyle='#fff';
    this.ctx.fillText('Dormio Strand Resort',W/2,H*0.195);
    // Punkte
    this.ctx.fillStyle='rgba(255,215,0,0.15)'; this.ctx.strokeStyle='#ffd700'; this.ctx.lineWidth=2;
    this.ctx.beginPath(); this.ctx.roundRect(W*0.18,H*0.215,W*0.64,H*0.07,8); this.ctx.fill(); this.ctx.stroke();
    this.ctx.font=`bold ${Math.floor(H*0.038)}px Segoe UI`; this.ctx.fillStyle='#ffd700';
    this.ctx.fillText(`⭐ ${Math.floor(this.player.score).toLocaleString('de-DE')} Punkte`,W/2,H*0.262);
    // Route
    this.ctx.font=`bold ${Math.floor(H*0.026)}px Segoe UI`; this.ctx.fillStyle='#aef0ff'; this.ctx.textAlign='left';
    this.ctx.fillText('🚗 Eure Reise:', W*0.06, H*0.322);
    this.ctx.font=`${Math.floor(H*0.022)}px Segoe UI`; this.ctx.fillStyle='#fff';
    ['⛪ Köln → 🏛️ Aachen → 🇧🇪 Belgien →','⚛️ Brüssel → 🏰 Gent → 🔔 Brügge → 🌊 Zeeland'].forEach((l,i)=>{
      this.ctx.fillText(l, W*0.06, H*0.355+i*H*0.028);
    });
    // Vorschau
    this.ctx.font=`bold ${Math.floor(H*0.028)}px Segoe UI`; this.ctx.fillStyle='#ffcc66';
    this.ctx.fillText('🏖️ Jetzt wartet der Urlaub auf euch:', W*0.06, H*0.44);
    this.ctx.font=`${Math.floor(H*0.021)}px Segoe UI`; this.ctx.fillStyle='#fff';
    VACATION_PREVIEW.forEach((act,i)=>{
      const col=i%2, row=Math.floor(i/2);
      this.ctx.fillText(`${act.emoji}  ${act.text}`, W*(0.06+col*0.47), H*(0.475+row*0.032));
    });
    // Button
    const bw=W*0.55,bh=H*0.072,bx=W/2-bw/2,by=H*0.91-bh/2;
    const bg=this.ctx.createLinearGradient(bx,by,bx,by+bh);
    bg.addColorStop(0,'#2ecc71'); bg.addColorStop(1,'#27ae60');
    this.ctx.fillStyle=bg; this.ctx.beginPath(); this.ctx.roundRect(bx,by,bw,bh,bh*0.3); this.ctx.fill();
    this.ctx.strokeStyle='#fff'; this.ctx.lineWidth=2; this.ctx.stroke();
    this.ctx.fillStyle='#fff'; this.ctx.font=`bold ${Math.floor(bh*0.45)}px Segoe UI`; this.ctx.textAlign='center';
    this.ctx.fillText('🔄 Nochmal fahren',W/2,H*0.91+bh*0.15);
  }

  loop(timestamp) {
    const dt = (timestamp - this.lastTime) / 1000;
    this.lastTime = timestamp;
    this.update(dt);
    this.draw();
    requestAnimationFrame(this.loop);
  }
}

const game = new Game(document.getElementById('c'));
</script>
</body>
